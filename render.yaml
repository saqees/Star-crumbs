services:
  - type: web
    name: star-crumbs-api
    env: node
    buildCommand: |
      npm install
      cd ../frontend && npm install && npm run build -- --configuration=production
      mkdir -p ../backend/public
      cp -r ../frontend/dist/star-crumbs/* ../backend/public/
    startCommand: node server.js
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false
